services:
  gjirafanewsapi:
    ports: ["8080:8080"]
    depends_on:
      loki:
        condition: service_started
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      papercut:
        condition: service_started
      kafka:
        condition: service_started
    image: ${DOCKER_REGISTRY-}gjirafanewsapi
    build:
      context: .
      dockerfile: GjirafaNewsAPI/Dockerfile
    environment:
      # Migrations run via direct Postgres connection (PgBouncer transaction pooling
      # breaks EF migrations' prepared statements / session state).
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=gjirafanews;Username=gjirafanews;Password=secret"
      ConnectionStrings__Redis: "redis:6379"
      ASPNETCORE_ENVIRONMENT: Development

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gjirafanews_postgres
    environment:
      POSTGRES_USER: gjirafanews
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gjirafanews
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gjirafanews"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PgBouncer (connection pooler) ─────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: gjirafanews_pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gjirafanews
      DB_PASSWORD: secret
      DB_NAME: gjirafanews
      LISTEN_PORT: 6432
      POOL_MODE: transaction               # Transaction pooling — best for .NET
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20                # 20 real PG conns shared among 1000 clients
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
    ports: ["6432:6432"]
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: gjirafanews_redis
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kafka (KRaft, single-broker dev) ──────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: gjirafanews_kafka
    ports:
      - "9094:9094"  # external listener for host tools
    environment:
      # KRaft — no ZooKeeper.
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Two listeners: PLAINTEXT for in-network containers, EXTERNAL for host.
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "gjirafanews-kraft-cluster"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gjirafanews_kafka_ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: gjirafanews
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      - kafka

  # Standalone .NET console consumer. Distinct group from the API so it sees
  # a parallel copy of every event.
  kafka-consumer:
    image: gjirafanews-kafka-consumer
    build:
      context: .
      dockerfile: KafkaConsumer/Dockerfile
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  # ── Papercut SMTP (dev-only mail catcher) ─────────────────────────────────
  papercut:
    image: changemakerstudiosus/papercut-smtp:latest
    container_name: gjirafanews_papercut
    ports:
      - "2525:2525"    # SMTP — apps inside the network use papercut:2525
      - "37408:8080"   # web UI — open http://localhost:37408 to read mail
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    ports: ["3100:3100"]

  grafana:
    image: grafana/grafana:11.0.0
    ports: ["3300:3300"]
    depends_on: [loki]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  kafka_data:
