server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any unknown path serves index.html so React Router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache fingerprinted assets aggressively; never cache the entry HTML.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
